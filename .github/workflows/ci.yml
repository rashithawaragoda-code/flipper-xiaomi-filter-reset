name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build FAP (${{ matrix.sdk-channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk-channel: [release, dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build with ufbt
        id: build-app
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          sdk-channel: ${{ matrix.sdk-channel }}

      - name: Upload FAP artifact
        uses: actions/upload-artifact@v7
        with:
          name: xiaomi_filter_reset-${{ matrix.sdk-channel }}
          path: ${{ steps.build-app.outputs.fap-artifacts }}
          if-no-files-found: error

  test:
    name: Host unit tests + core lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint the pure core (strict warnings)
        run: make -C test lint

      - name: Run host unit tests
        run: make -C test test

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ufbt itself ships the pinned clang-format, so the check runs through the
      # ufbt-action: provision the SDK once, then run `ufbt lint` against it.
      - name: Set up ufbt + SDK
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          sdk-channel: release
          task: setup

      - name: Check formatting
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          skip-setup: true
          task: lint

  clang-tidy:
    name: clang-tidy (core)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      # sha1.c is vendored, public-domain code (after Steve Reid) that we keep
      # verbatim, so only our own core sources are analyzed.
      - name: Analyze core
        run: clang-tidy $(find src/core -name '*.c' -not -name 'sha1.c') -- -std=c11 -Isrc/core
